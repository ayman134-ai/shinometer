<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>مقياس الشناه برو | VIP Skin Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --card-bg: rgba(18,18,28,0.85);
            --gold: #d4af37;
            --gold-light: #f0d060;
            --text: #e0d6c2;
            --sub: #a09080;
            --border: rgba(212,175,55,0.3);
            --red: #c0392b;
            --green: #2ecc71;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            direction: rtl;
        }
        .container {
            max-width: 460px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 28px;
            padding: 24px 16px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), 0 0 20px rgba(212,175,55,0.1);
            text-align: center;
        }
        .gold-text { color: var(--gold); font-weight: bold; }
        .badge {
            background: rgba(212,175,55,0.1);
            color: var(--gold);
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            margin: 4px;
            border: 1px solid var(--border);
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin: 16px 0;
            flex-wrap: wrap;
            justify-content: center;
        }
        .tab {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--sub);
            padding: 8px 16px;
            border-radius: 24px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(5px);
        }
        .tab.active {
            background: var(--gold);
            color: #000;
            font-weight: 700;
            border-color: var(--gold);
        }
        .panel {
            display: none;
        }
        .panel.active {
            display: block;
        }

        .upload-zone {
            background: rgba(255,255,255,0.03);
            border: 2px dashed var(--border);
            border-radius: 20px;
            padding: 28px 16px;
            cursor: pointer;
            transition: 0.2s;
            margin: 12px 0;
            position: relative;
        }
        .upload-zone:hover {
            border-color: var(--gold);
            background: rgba(212,175,55,0.03);
        }
        .upload-zone img {
            max-width: 100%;
            max-height: 250px;
            border-radius: 14px;
            display: none;
        }
        .btn {
            background: linear-gradient(135deg, var(--gold), #b8942e);
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
            transition: 0.2s;
            letter-spacing: 1px;
            box-shadow: 0 6px 20px rgba(212,175,55,0.2);
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .btn.red {
            background: linear-gradient(135deg, #c0392b, #e74c3c);
            color: #fff;
        }

        .progress-wrap {
            display: none;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            height: 16px;
            margin: 12px 0;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--gold), var(--gold-light));
            border-radius: 12px;
            transition: width 0.2s linear;
        }
        .progress-text {
            font-size: 12px;
            color: var(--gold);
            margin: 4px 0;
        }

        .result-box {
            background: rgba(212,175,55,0.05);
            border: 1px solid var(--gold);
            border-radius: 20px;
            padding: 20px;
            margin: 16px 0;
            display: none;
            box-shadow: 0 0 25px rgba(212,175,55,0.2);
            animation: subtleGlow 2s infinite alternate;
        }
        @keyframes subtleGlow {
            0% { box-shadow: 0 0 15px rgba(212,175,55,0.15); }
            100% { box-shadow: 0 0 35px rgba(212,175,55,0.35); }
        }
        .big-score {
            font-size: 56px;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 15px rgba(212,175,55,0.4);
        }
        .category {
            font-size: 24px;
            font-weight: 700;
            margin: 4px 0;
        }
        .comment {
            font-size: 15px;
            margin: 12px 0;
            padding: 14px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            border-right: 3px solid var(--gold);
            line-height: 1.6;
        }
        .blood-bar {
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            height: 10px;
            margin: 8px 0;
            overflow: hidden;
        }
        .blood-fill {
            height: 100%;
            background: var(--red);
            border-radius: 8px;
            transition: width 0.4s;
        }

        canvas {
            display: none;
            margin: 10px auto;
            border-radius: 14px;
            border: 1px solid var(--border);
            max-width: 100%;
        }

        .gender-btns {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 10px 0;
        }
        .gender-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--sub);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }
        .gender-btn.active {
            background: var(--gold);
            color: #000;
            border-color: var(--gold);
        }

        .vs {
            font-size: 30px;
            margin: 8px 0;
            color: var(--gold);
        }

        #fileInput, #fileInput2, #fileInput3 { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:var(--gold); font-weight:900; font-size:24px; margin-bottom:4px;">🧬 مقياس الشناه برو</h2>
    <div class="badge">تحليل جيني دقيق</div>
    <div class="badge">كشف الأنساب 2.0</div>
    <div class="badge">VIP Skin Lab</div>

    <div class="tabs">
        <div class="tab active" data-tab="scan">🔬 فحص فردي</div>
        <div class="tab" data-tab="battle">⚔️ معركة 1v1</div>
    </div>

    <!-- SINGLE SCAN -->
    <div class="panel active" id="panel-scan">
        <div class="gender-btns" id="genderBtns">
            <span style="color:var(--sub);font-size:12px;">اختر جنسك:</span>
            <span class="gender-btn active" data-gender="male">🧔🏻 رجال</span>
            <span class="gender-btn" data-gender="female">👩🏻 بنت</span>
        </div>

        <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
            <div id="placeholder1"><div class="icon">📷</div><div>ارفع صورتك هنا</div><div style="font-size:11px;color:var(--sub);">PNG, JPG, WEBP</div></div>
            <img id="preview1" alt="preview">
        </div>
        <input type="file" id="fileInput" accept="image/*" onchange="handleFile(event,1)">

        <button class="btn" id="btnScan" disabled onclick="runScan()">🔬 حلل وجهي</button>

        <div class="progress-wrap" id="progressWrap">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-text" id="progressText"></div>
        <canvas id="canvas1"></canvas>

        <div class="result-box" id="resultBox">
            <div style="color:var(--sub);font-size:11px;">مقدار الشناه المقدر</div>
            <div class="big-score" id="scoreVal">-</div>
            <div class="category" id="categoryVal"></div>
            <div class="comment" id="commentVal"></div>
            <div style="margin-top:12px;color:var(--sub);font-size:11px;">نسبة العبد في الدم</div>
            <div class="blood-bar"><div class="blood-fill" id="bloodFill" style="width:0%;"></div></div>
            <div style="font-size:13px;color:var(--red);" id="bloodText"></div>
        </div>
    </div>

    <!-- BATTLE -->
    <div class="panel" id="panel-battle">
        <div style="display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap;">
            <div style="flex:1;min-width:120px;">
                <div class="upload-zone" onclick="document.getElementById('fileInput2').click()">
                    <div id="placeholder2"><div class="icon">🧑</div><div>المتحدي 1</div></div>
                    <img id="preview2" alt="p1">
                </div>
            </div>
            <div class="vs">⚔️</div>
            <div style="flex:1;min-width:120px;">
                <div class="upload-zone" onclick="document.getElementById('fileInput3').click()">
                    <div id="placeholder3"><div class="icon">🧑</div><div>المتحدي 2</div></div>
                    <img id="preview3" alt="p2">
                </div>
            </div>
        </div>
        <input type="file" id="fileInput2" accept="image/*" onchange="handleFile(event,2)">
        <input type="file" id="fileInput3" accept="image/*" onchange="handleFile(event,3)">
        <button class="btn" id="btnBattle" disabled onclick="runBattle()">⚔️ ابدأ المعركة</button>
        <div class="result-box" id="battleResult">
            <div style="font-size:20px;font-weight:bold;" id="battleWinner"></div>
            <div class="comment" id="battleComment"></div>
        </div>
    </div>
</div>

<script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script>
    // ========== تهيئة النماذج مسبقاً ==========
    const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
    let modelsReady = false;
    
    // تحميل النماذج الخفيفة بمجرد تحميل الصفحة
    const loadModelsPromise = (async () => {
        await Promise.all([
            faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
            faceapi.nets.faceLandmark68TinyNet.loadFromUri(MODEL_URL)
        ]);
        modelsReady = true;
        console.log('✅ النماذج جاهزة');
    })().catch(e => console.warn('⚠️ فشل تحميل النماذج:', e));

    // ========== المتغيرات العامة ==========
    let selectedGender = 'male';
    let currentImage = null;

    // ========== التنقل بين الأقسام ==========
    document.querySelectorAll('.tab').forEach(t => {
        t.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
            t.classList.add('active');
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById('panel-' + t.dataset.tab).classList.add('active');
        });
    });

    // ========== أزرار الجنس ==========
    document.querySelectorAll('.gender-btn').forEach(b => {
        b.addEventListener('click', function() {
            document.querySelectorAll('.gender-btn').forEach(x => x.classList.remove('active'));
            this.classList.add('active');
            selectedGender = this.dataset.gender;
        });
    });

    // ========== رفع الملفات ==========
    function handleFile(event, slot) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
            const preview = document.getElementById('preview' + slot);
            const placeholder = document.getElementById('placeholder' + slot);
            // استخدام createImageBitmap لتحليل أسرع
            const blob = await fetch(e.target.result).then(r => r.blob());
            currentImage = await createImageBitmap(blob);
            if (preview) {
                preview.src = URL.createObjectURL(blob);
                preview.style.display = 'block';
            }
            if (placeholder) placeholder.style.display = 'none';
            checkButtons();
        };
        reader.readAsDataURL(file);
    }

    function checkButtons() {
        const p1 = document.getElementById('preview1').style.display === 'block';
        const p2 = document.getElementById('preview2').style.display === 'block';
        const p3 = document.getElementById('preview3').style.display === 'block';
        document.getElementById('btnScan').disabled = !p1;
        document.getElementById('btnBattle').disabled = !(p2 && p3);
    }

    // ========== المحلل المُحسّن ==========
    async function analyzeImage(sourceImage) {
        // خفض الدقة إلى 300px للتحليل السريع
        const MAX_SIZE = 300;
        let scale = 1;
        const canvas = document.createElement('canvas');
        if (sourceImage.width > sourceImage.height && sourceImage.width > MAX_SIZE) {
            scale = MAX_SIZE / sourceImage.width;
        } else if (sourceImage.height > MAX_SIZE) {
            scale = MAX_SIZE / sourceImage.height;
        }
        canvas.width = Math.round(sourceImage.width * scale);
        canvas.height = Math.round(sourceImage.height * scale);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(sourceImage, 0, 0, canvas.width, canvas.height);
        
        // استخدام النسخة المضغوطة للكشف
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const imageTensor = faceapi.tf.browser.fromPixels(canvas);
        
        await modelsReady;
        
        const detections = await faceapi.detectAllFaces(canvas, new faceapi.TinyFaceDetectorOptions({ inputSize: 160 })).withFaceLandmarks(true);
        
        if (detections.length === 0) return { error: 'no_face' };
        if (detections.length > 1) return { error: 'multi_face' };

        const detection = detections[0];
        const landmarks = detection.landmarks;
        const box = detection.detection.box;

        // فحوصات الجودة (على الصورة المصغرة)
        if (getAverageBrightness(imageData) < 25) return { error: 'too_dark' };
        if (getTextureVariance(imageData) < 2.5) return { error: 'cartoon' };

        // رسم 3D Mesh على Canvas منفصل
        const resultCanvas = document.getElementById('canvas1');
        resultCanvas.width = sourceImage.width;
        resultCanvas.height = sourceImage.height;
        resultCanvas.style.display = 'block';
        const resCtx = resultCanvas.getContext('2d');
        resCtx.drawImage(sourceImage, 0, 0);
        
        // ضبط نقاط المعالم حسب مقياس الصورة الأصلية
        const scaleX = sourceImage.width / canvas.width;
        const scaleY = sourceImage.height / canvas.height;
        const scaledLandmarks = landmarks.positions.map(p => ({ x: p.x * scaleX, y: p.y * scaleY }));
        
        resCtx.strokeStyle = '#00ff41';
        resCtx.lineWidth = 1.2;
        resCtx.beginPath();
        // رسم شبكة الأنف
        const nose = scaledLandmarks.slice(27, 36);
        if (nose.length > 3) {
            resCtx.moveTo(nose[0].x, nose[0].y);
            for (let i = 1; i < nose.length; i++) resCtx.lineTo(nose[i].x, nose[i].y);
            resCtx.closePath();
            resCtx.stroke();
        }
        // رسم العينين
        [scaledLandmarks.slice(36, 42), scaledLandmarks.slice(42, 48)].forEach(eye => {
            if (eye.length > 3) {
                resCtx.beginPath();
                resCtx.moveTo(eye[0].x, eye[0].y);
                for (let i = 1; i < eye.length; i++) resCtx.lineTo(eye[i].x, eye[i].y);
                resCtx.closePath();
                resCtx.stroke();
            }
        });
        // رسم الفم
        const mouth = scaledLandmarks.slice(48, 60);
        if (mouth.length > 3) {
            resCtx.beginPath();
            resCtx.moveTo(mouth[0].x, mouth[0].y);
            for (let i = 1; i < mouth.length; i++) resCtx.lineTo(mouth[i].x, mouth[i].y);
            resCtx.closePath();
            resCtx.stroke();
        }

        // ========== الحسابات ==========
        // استخدم landmarks الأصلية (بدون تحجيم) للحسابات النسبية
        const goldenScore = calculateGoldenRatio(landmarks, box);
        const skinScore = analyzeSkin(imageData, landmarks, canvas.width, canvas.height);
        const hairScore = analyzeHair(imageData, landmarks, canvas.width, canvas.height);
        
        // وزن التقييم: 50% تناسق، 30% بشرة، 20% شعر
        let final = (goldenScore * 0.5) + (skinScore * 0.3) + (hairScore * 0.2);
        let score = Math.round(final);
        score = Math.min(9, Math.max(1, score));

        const bloodPercent = Math.round((11 - score) * 10);
        
        return {
            score,
            category: getCategory(score, selectedGender),
            comment: getComment(score, selectedGender),
            bloodPercent
        };
    }

    // ========== النسبة الذهبية ==========
    function calculateGoldenRatio(landmarks, box) {
        const phi = 1.618;
        // استخراج المسافات الأساسية فقط
        const leftEye = landmarks.getLeftEye();
        const rightEye = landmarks.getRightEye();
        const nose = landmarks.getNose();
        const mouth = landmarks.getMouth();
        
        // المسافة بين العينين / عرض العين
        const eyeDist = Math.abs(rightEye[0].x - leftEye[3].x);
        const eyeWidth = (Math.abs(rightEye[3].x - rightEye[0].x) + Math.abs(leftEye[3].x - leftEye[0].x)) / 2;
        const ratio1 = eyeDist / eyeWidth;
        
        // عرض الفم / عرض الأنف
        const mouthWidth = Math.abs(mouth[6].x - mouth[0].x);
        const noseWidth = Math.abs(nose[4].x - nose[0].x);
        const ratio2 = mouthWidth / noseWidth;
        
        // المسافة من العين للفم / من العين للجبهة
        const eyeY = (leftEye[0].y + rightEye[0].y) / 2;
        const mouthY = mouth[6].y;
        const foreheadY = box.y;
        const ratio3 = (mouthY - eyeY) / Math.max(1, (eyeY - foreheadY));
        
        const scores = [
            10 - Math.abs(ratio1 - phi) * 3.5,
            10 - Math.abs(ratio2 - phi) * 3.5,
            10 - Math.abs(ratio3 - phi) * 3.0
        ];
        const avg = scores.reduce((a,b) => a + b, 0) / scores.length;
        return Math.max(1, Math.min(10, avg));
    }

    // ========== تحليل البشرة (3 نقاط) ==========
    function analyzeSkin(imageData, landmarks, w, h) {
        const leftEye = landmarks.getLeftEye();
        const rightEye = landmarks.getRightEye();
        // 3 نقاط: الوجنة اليسرى، الوجنة اليمنى، الجبهة
        const points = [
            { x: leftEye[0].x + 15, y: leftEye[0].y + 25 },
            { x: rightEye[3].x - 15, y: rightEye[3].y + 25 },
            { x: (leftEye[0].x + rightEye[3].x) / 2, y: box.y + 40 }
        ];
        
        let totalL = 0;
        points.forEach(p => {
            const px = Math.round(p.x);
            const py = Math.round(p.y);
            if (px > 0 && px < w && py > 0 && py < h) {
                const idx = (py * w + px) * 4;
                const r = imageData.data[idx];
                const g = imageData.data[idx + 1];
                const b = imageData.data[idx + 2];
                // تحويل مبسط لـ Luminance
                const L = 0.2126 * r + 0.7152 * g + 0.0722 * b;
                totalL += L;
            }
        });
        const avgL = totalL / 3;
        
        if (avgL >= 220) return 10;
        else if (avgL >= 190) return 9;
        else if (avgL >= 160) return 8;
        else if (avgL >= 130) return 7;
        else if (avgL >= 100) return 6;
        else if (avgL >= 75) return 5;
        else if (avgL >= 50) return 4;
        else if (avgL >= 30) return 3;
        else if (avgL >= 15) return 2;
        else return 1;
    }

    // ========== تحليل الشعر (منطقة واحدة) ==========
    function analyzeHair(imageData, landmarks, w, h) {
        const leftEye = landmarks.getLeftEye();
        const rightEye = landmarks.getRightEye();
        // منطقة فوق الجبهة مباشرة
        const startX = Math.round(box.x);
        const startY = Math.round(Math.max(0, box.y - 30));
        const regionW = Math.round(box.width);
        const regionH = Math.min(40, h - startY);
        if (regionW < 10 || regionH < 10) return 5;
        
        let graySum = 0, grayCount = 0;
        const pixels = [];
        for (let y = startY; y < startY + regionH; y++) {
            for (let x = startX; x < startX + regionW; x++) {
                const idx = (y * w + x) * 4;
                const gray = 0.299 * imageData.data[idx] + 0.587 * imageData.data[idx+1] + 0.114 * imageData.data[idx+2];
                pixels.push(gray);
                graySum += gray;
                grayCount++;
            }
        }
        const mean = graySum / grayCount;
        const variance = pixels.reduce((sum, g) => sum + Math.pow(g - mean, 2), 0) / grayCount;
        const stdDev = Math.sqrt(variance);
        
        if (stdDev < 8) return 10;
        else if (stdDev < 15) return 9;
        else if (stdDev < 22) return 8;
        else if (stdDev < 30) return 7;
        else if (stdDev < 38) return 6;
        else if (stdDev < 46) return 5;
        else if (stdDev < 55) return 4;
        else if (stdDev < 65) return 3;
        else if (stdDev < 75) return 2;
        else return 1;
    }

    // ========== التعليقات والألقاب ==========
    function getCategory(score, gender) {
        const maleMap = {9:'عسول 😍🔥',8:'جنى عرب 😎💣',7:'وجيه 😌✨',6:'زول ساي 😐🍞',5:'عادي 🫥📉',4:'شين رانك 💀📱',3:'فار 🐀🤮',2:'قرد 🙈💔',1:'Error 🚫👹'};
        const femaleMap = {9:'مزة 😍👑',8:'عسل 🍯💃',7:'بابور 🚂🔥',6:'مقبولة 😊🌸',5:'عادية 😐🧴',4:'محتاجة شغل 🛠️📉',3:'جعفر 😬🪞',2:'افسخي 🧽😭',1:'حمد ولد 🥲🤷‍♀️'};
        return gender === 'female' ? (femaleMap[score] || '') : (maleMap[score] || '');
    }

    function getComment(score, gender) {
        if (gender === 'female') {
            const map = {
                9:'انتي ما بت، انتي زلزال 9 ريختر في عالم الجمال. وشك ده يخلي الشيوخ تتلخبط في الدعاء. قمر 14 وخجلان منك.',
                8:'خطيرة لمن بهناك، جمالك ده يعمل أزمة في البلد. أي ولد يشوفك بتجيهو جلطة خفيفة، تبارك الخلاق.',

    // ========== تشغيل الفحص ==========
    async function runScan() {
        if (!currentImage) return;
        
        const btn = document.getElementById('btnScan');
        const progressWrap = document.getElementById('progressWrap');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const resultBox = document.getElementById('resultBox');
        
        btn.disabled = true;
        progressWrap.style.display = 'block';
        progressFill.style.width = '0%';
        resultBox.style.display = 'none';
        
        // 3 خطوات فقط مع سرعة ثابتة
        const steps = ['🔍 كشف الوجه...', '📐 قياس التناسق...', '🧬 تحليل الملامح...'];
        for (let i = 0; i < steps.length; i++) {
            progressText.textContent = steps[i];
            const progress = ((i + 1) / steps.length) * 100;
            progressFill.style.width = progress + '%';
            await new Promise(r => setTimeout(r, 600)); // 600ms ثابتة لكل خطوة
        }
        
        try {
            const result = await analyzeImage(currentImage);
            
            if (result.error) {
                const messages = {
                    'no_face': '🚫 ما لقينا وجه بشري! تأكد من الصورة.',
                    'multi_face': '👥 في الصورة أكثر من وجه! صورة بوجه واحد فقط.',
                    'too_dark': '🌑 الصورة مظلمة جداً! نحتاج إضاءة أفضل.',
                    'cartoon': '🎭 هذه الصورة تبدو كرتونية أو معدلة جداً!'
                };
                alert(messages[result.error] || 'فشل التحليل');
                btn.disabled = false;
                progressWrap.style.display = 'none';
                return;
            }
            
            document.getElementById('scoreVal').textContent = result.score + '/9';
            document.getElementById('categoryVal').textContent = result.category;
            document.getElementById('commentVal').textContent = result.comment;
            document.getElementById('bloodFill').style.width = result.bloodPercent + '%';
            document.getElementById('bloodText').textContent = result.bloodPercent + '%';
            resultBox.style.display = 'block';
        } catch (e) {
            alert('⚠️ حدث خطأ غير متوقع. تأكد من اتصال الإنترنت وحاول مجدداً.');
            console.error(e);
        } finally {
            progressWrap.style.display = 'none';
            btn.disabled = false;
        }
    }

    // ========== تشغيل المعركة ==========
    async function runBattle() {
        const img2 = document.getElementById('preview2');
        const img3 = document.getElementById('preview3');
        if (!img2 || !img3) return;
        
        const btn = document.getElementById('btnBattle');
        const resultBox = document.getElementById('battleResult');
        btn.disabled = true;
        resultBox.style.display = 'none';
        
        // استخدام الصورة الأصلية
        const blob2 = await fetch(img2.src).then(r => r.blob());
        const blob3 = await fetch(img3.src).then(r => r.blob());
        const image2 = await createImageBitmap(blob2);
        const image3 = await createImageBitmap(blob3);
        
        const r1 = await analyzeImage(image2);
        const r2 = await analyzeImage(image3);
        
        if (r1?.error || r2?.error) {
            alert('تأكد من وجهين صالحين.');
            btn.disabled = false;
            return;
        }
        
        let winner, loser;
        if (r1.score > r2.score) { winner = 'المتحدي 1'; loser = 'المتحدي 2'; }
        else if (r2.score > r1.score) { winner = 'المتحدي 2'; loser = 'المتحدي 1'; }
        else { winner = 'تعادل'; }
        
        document.getElementById('battleWinner').textContent = winner === 'تعادل' ? '🤝 تعادل!' : `👑 ${winner} فاز!`;
        document.getElementById('battleComment').textContent = winner === 'تعادل' ? 'الاتنين نفس المستوى.' : `${winner} أجمل بمراحل. ${loser} روح استرجل.`;
        resultBox.style.display = 'block';
        btn.disabled = false;
    }

    // ========== دوال مساعدة ==========
    function getAverageBrightness(imageData) {
        let sum = 0;
        const data = imageData.data;
        for (let i = 0; i < data.length; i += 4) {
            sum += (data[i] + data[i+1] + data[i+2]) / 3;
        }
        return sum / (imageData.width * imageData.height);
    }

    function getTextureVariance(imageData) {
        let sum = 0, count = 0;
        const gray = [];
        const data = imageData.data;
        for (let i = 0; i < data.length; i += 4) {
            const g = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
            gray.push(g);
            sum += g;
            count++;
        }
        const mean = sum / count;
        const variance = gray.reduce((s, g) => s + Math.pow(g - mean, 2), 0) / count;
        return Math.sqrt(variance);
    }

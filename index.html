<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>مقياس الشناه برو | VIP Skin Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --card-bg: rgba(18,18,28,0.85);
            --gold: #d4af37;
            --gold-light: #f0d060;
            --text: #e0d6c2;
            --sub: #a09080;
            --border: rgba(212,175,55,0.3);
            --red: #c0392b;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background: var(--bg);
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:16px;
            direction:rtl;
        }
        .container {
            max-width:460px;
            width:100%;
            background:var(--card-bg);
            backdrop-filter:blur(15px);
            -webkit-backdrop-filter:blur(15px);
            border-radius:28px;
            padding:24px 16px;
            border:1px solid var(--border);
            box-shadow:0 20px 50px rgba(0,0,0,0.6);
            text-align:center;
        }
        .gold-text{ color:var(--gold); font-weight:bold; }
        .badge{
            background:rgba(212,175,55,0.1); color:var(--gold); font-size:11px;
            padding:4px 12px; border-radius:20px; display:inline-block; margin:4px;
            border:1px solid var(--border);
        }
        .tabs{ display:flex; gap:8px; margin:16px 0; flex-wrap:wrap; justify-content:center; }
        .tab{
            background:rgba(255,255,255,0.05); border:1px solid var(--border);
            color:var(--sub); padding:8px 16px; border-radius:24px; font-size:13px;
            cursor:pointer; transition:0.2s;
        }
        .tab.active{ background:var(--gold); color:#000; font-weight:700; border-color:var(--gold); }
        .panel{ display:none; }
        .panel.active{ display:block; }
        .upload-zone{
            background:rgba(255,255,255,0.03); border:2px dashed var(--border);
            border-radius:20px; padding:28px 16px; cursor:pointer; transition:0.2s;
            margin:12px 0; position:relative;
        }
        .upload-zone:hover{ border-color:var(--gold); }
        .upload-zone img{ max-width:100%; max-height:250px; border-radius:14px; display:none; }
        .btn{
            background:linear-gradient(135deg, var(--gold), #b8942e); color:#000;
            border:none; padding:14px; border-radius:14px; font-size:16px; font-weight:700;
            cursor:pointer; width:100%; margin:10px 0; transition:0.2s;
            letter-spacing:1px; box-shadow:0 6px 20px rgba(212,175,55,0.2);
        }
        .btn:active{ transform:scale(0.97); }
        .btn:disabled{ opacity:0.4; pointer-events:none; }
        .progress-wrap{
            display:none; background:rgba(255,255,255,0.05); border-radius:12px;
            height:16px; margin:12px 0; overflow:hidden; border:1px solid var(--border);
        }
        .progress-fill{
            height:100%; width:0%; background:linear-gradient(90deg, var(--gold), var(--gold-light));
            border-radius:12px; transition:width 0.2s;
        }
        .progress-text{ font-size:12px; color:var(--gold); margin:4px 0; }
        .result-box{
            background:rgba(212,175,55,0.05); border:1px solid var(--gold);
            border-radius:20px; padding:20px; margin:16px 0; display:none;
            box-shadow:0 0 25px rgba(212,175,55,0.2);
            animation:subtleGlow 2s infinite alternate;
        }
        @keyframes subtleGlow {
            0%{ box-shadow:0 0 15px rgba(212,175,55,0.15); }
            100%{ box-shadow:0 0 35px rgba(212,175,55,0.35); }
        }
        .big-score{ font-size:56px; font-weight:900; color:var(--gold); }
        .category{ font-size:24px; font-weight:700; margin:4px 0; }
        .comment{
            font-size:15px; margin:12px 0; padding:14px; background:rgba(0,0,0,0.3);
            border-radius:12px; border-right:3px solid var(--gold); line-height:1.6;
        }
        .blood-bar{ background:rgba(255,255,255,0.05); border-radius:8px; height:10px; margin:8px 0; overflow:hidden; }
        .blood-fill{ height:100%; background:var(--red); border-radius:8px; transition:width 0.4s; }
        .details-grid{
            display:flex; flex-wrap:wrap; justify-content:space-between; margin:10px 0; gap:10px;
        }
        .detail-item{
            background:rgba(255,255,255,0.03); border-radius:12px; padding:8px;
            flex:1 1 45%; border:1px solid var(--border); font-size:13px;
        }
        .detail-value{ color:var(--gold); font-weight:bold; font-size:16px; }
        canvas{ display:none; margin:10px auto; border-radius:14px; border:1px solid var(--border); max-width:100%; }
        .gender-btns{ display:flex; gap:8px; justify-content:center; margin:10px 0; }
        .gender-btn{
            background:rgba(255,255,255,0.05); border:1px solid var(--border);
            color:var(--sub); padding:8px 16px; border-radius:20px; font-size:13px;
            cursor:pointer; transition:0.2s;
        }
        .gender-btn.active{ background:var(--gold); color:#000; border-color:var(--gold); }
        .vs{ font-size:30px; margin:8px 0; color:var(--gold); }
        #fileInput,#fileInput2,#fileInput3{ display:none; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:var(--gold); font-weight:900; font-size:24px; margin-bottom:4px;">🧬 مقياس الشناه برو</h2>
    <div class="badge">تحليل جيني دقيق</div>
    <div class="badge">كشف الأنساب 2.0</div>
    <div class="badge">VIP Skin Lab</div>

    <div class="tabs">
        <div class="tab active" data-tab="scan">🔬 فحص فردي</div>
        <div class="tab" data-tab="battle">⚔️ معركة 1v1</div>
    </div>

    <!-- فحص فردي -->
    <div class="panel active" id="panel-scan">
        <div class="gender-btns">
            <span class="gender-btn active" data-gender="male">🧔🏻 رجال</span>
            <span class="gender-btn" data-gender="female">👩🏻 بنت</span>
        </div>
        <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
            <div id="placeholder1"><div class="icon">📷</div><div>ارفع صورتك هنا</div><div style="font-size:11px;color:var(--sub);">PNG, JPG, WEBP</div></div>
            <img id="preview1" alt="preview">
        </div>
        <input type="file" id="fileInput" accept="image/*" onchange="handleFile(event,1)">
        <button class="btn" id="btnScan" disabled onclick="runScan()">🔬 حلل وجهي</button>
        <div class="progress-wrap" id="progressWrap"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-text" id="progressText"></div>
        <canvas id="canvas1"></canvas>

        <div class="result-box" id="resultBox">
            <div style="color:var(--sub);font-size:11px;">الدرجة الكلية من 100</div>
            <div class="big-score" id="scoreVal">-</div>
            <div class="category" id="categoryVal"></div>
            <div class="comment" id="commentVal"></div>
            <div class="details-grid" id="detailsGrid"></div>
            <div style="margin-top:12px;color:var(--sub);font-size:11px;">نسبة العبد في الدم</div>
            <div class="blood-bar"><div class="blood-fill" id="bloodFill" style="width:0%;"></div></div>
            <div style="font-size:13px;color:var(--red);" id="bloodText"></div>
        </div>
    </div>

    <!-- معركة -->
    <div class="panel" id="panel-battle">
        <div style="display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap;">
            <div style="flex:1;min-width:120px;">
                <div class="upload-zone" onclick="document.getElementById('fileInput2').click()">
                    <div id="placeholder2"><div class="icon">🧑</div><div>المتحدي 1</div></div>
                    <img id="preview2" alt="p1">
                </div>
            </div>
            <div class="vs">⚔️</div>
            <div style="flex:1;min-width:120px;">
                <div class="upload-zone" onclick="document.getElementById('fileInput3').click()">
                    <div id="placeholder3"><div class="icon">🧑</div><div>المتحدي 2</div></div>
                    <img id="preview3" alt="p2">
                </div>
            </div>
        </div>
        <input type="file" id="fileInput2" accept="image/*" onchange="handleFile(event,2)">
        <input type="file" id="fileInput3" accept="image/*" onchange="handleFile(event,3)">
        <button class="btn" id="btnBattle" disabled onclick="runBattle()">⚔️ ابدأ المعركة</button>
        <div class="progress-text" id="battleProgressText" style="display:none;"></div>
        <div class="result-box" id="battleResult">
            <div style="font-size:20px;font-weight:bold;" id="battleWinner"></div>
            <div class="comment" id="battleComment"></div>
        </div>
    </div>
</div>

<script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script>
    // ========== 1. تحميل النماذج مع fallback + فحص إنترنت حقيقي ==========
    const MODEL_URLS = [
        'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/',
        'https://unpkg.com/@vladmandic/face-api/model/'
    ];
    let modelsReady = false;

    function hasInternet() {
        return navigator.onLine;
    }

    async function initModels() {
        if (!hasInternet()) {
            console.warn('لا يوجد اتصال إنترنت');
            return;
        }

        // تفعيل WASM للمتصفحات الحديثة
        if (faceapi.tf && faceapi.tf.setBackend) {
            try { await faceapi.tf.setBackend('wasm'); } catch(e) {
                try { await faceapi.tf.setBackend('webgl'); } catch(e2){}
            }
        }

        for (let url of MODEL_URLS) {
            try {
                console.log('تحميل من:', url);
                await Promise.race([
                    Promise.all([
                        faceapi.nets.tinyFaceDetector.loadFromUri(url),
                        faceapi.nets.faceLandmark68TinyNet.loadFromUri(url)
                    ]),
                    new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 12000))
                ]);
                modelsReady = true;
                console.log('تم تحميل النماذج');
                return;
            } catch (e) {
                console.warn('فشل التحميل من:', url);
            }
        }
        modelsReady = false;
        console.error('فشل تحميل جميع المصادر');
    }

    const modelPromise = initModels();

    // ========== 2. المتغيرات العامة ==========
    let selectedGender = 'male';
    let originalImages = { 1: null, 2: null, 3: null };

    // أزرار الجنس
    document.querySelectorAll('.gender-btn').forEach(b => {
        b.addEventListener('click', function() {
            document.querySelectorAll('.gender-btn').forEach(x => x.classList.remove('active'));
            this.classList.add('active');
            selectedGender = this.dataset.gender;
        });
    });

    // ألسنة التبويب
    document.querySelectorAll('.tab').forEach(t => {
        t.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
            t.classList.add('active');
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById('panel-' + t.dataset.tab).classList.add('active');
        });
    });

    // ========== 3. رفع الملفات ==========
    function handleFile(event, slot) {
        const file = event.target.files[0];
        if (!file) return;
        if (file.size > 20 * 1024 * 1024) {
            showMessage('🚫 حجم الصورة كبير جداً. الرجاء صورة أقل من 20MB.');
            return;
        }
        if (!file.type.startsWith('image/')) {
            showMessage('🚫 هذا ليس ملف صورة صالح.');
            return;
        }
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                originalImages[slot] = {
                    element: img,
                    width: img.naturalWidth,
                    height: img.naturalHeight
                };
                const preview = document.getElementById('preview' + slot);
                const placeholder = document.getElementById('placeholder' + slot);
                if (preview) { preview.src = e.target.result; preview.style.display = 'block'; }
                if (placeholder) placeholder.style.display = 'none';
                checkButtons();
            };
            img.onerror = () => showMessage('🚫 فشل تحميل الصورة.');
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function showMessage(msg) {
        const pText = document.getElementById('progressText');
        if (pText) {
            pText.textContent = msg;
            pText.style.color = '#ff6666';
            setTimeout(() => { pText.textContent = ''; pText.style.color = 'var(--gold)'; }, 4000);
        } else {
            alert(msg);
        }
    }

    function checkButtons() {
        document.getElementById('btnScan').disabled = !originalImages[1];
        document.getElementById('btnBattle').disabled = !(originalImages[2] && originalImages[3]);
    }

    // ========== 4. دوال التحليل (نظام 100 نقطة بأوزان 35/25/20/20) ==========

    // Z-Score لتطبيع لون البشرة
    function skinColorScore(imageData, box, w, h) {
        const startX = Math.round(box.x);
        const startY = Math.round(box.y);
        const bw = Math.round(box.width);
        const bh = Math.round(box.height);

        // جمع كل بكسلات الوجه لحساب المتوسط والانحراف المعياري
        let facePixels = [];
        for (let y = startY; y < Math.min(startY + bh, h); y++) {
            for (let x = startX; x < Math.min(startX + bw, w); x++) {
                const idx = (y * w + x) * 4;
                const L = 0.2126*imageData.data[idx] + 0.7152*imageData.data[idx+1] + 0.0722*imageData.data[idx+2];
                facePixels.push(L);
            }
        }
        if (facePixels.length === 0) return 10;

        // المتوسط والانحراف المعياري
        const mean = facePixels.reduce((a,b)=>a+b,0) / facePixels.length;
        const variance = facePixels.reduce((s,g)=>s+Math.pow(g-mean,2),0) / facePixels.length;
        const std = Math.sqrt(variance) || 1;

        // ROI نسبي من bounding box (الخدين + الجبهة)
        const cheekW = Math.round(bw * 0.25);
        const cheekH = Math.round(bh * 0.3);
        const regions = [
            { x: startX + Math.round(bw * 0.1), y: startY + Math.round(bh * 0.5), w: cheekW, h: cheekH },  // خد أيسر
            { x: startX + Math.round(bw * 0.65), y: startY + Math.round(bh * 0.5), w: cheekW, h: cheekH }, // خد أيمن
            { x: startX + Math.round(bw * 0.3), y: startY + Math.round(bh * 0.1), w: Math.round(bw * 0.4), h: Math.round(bh * 0.2) } // جبهة
        ];

        let regionLuminances = [];
        regions.forEach(region => {
            for (let y = region.y; y < Math.min(region.y + region.h, h); y++) {
                for (let x = region.x; x < Math.min(region.x + region.w, w); x++) {
                    const idx = (y * w + x) * 4;
                    const L = 0.2126*imageData.data[idx] + 0.7152*imageData.data[idx+1] + 0.0722*imageData.data[idx+2];
                    regionLuminances.push(L);
                }
            }
        });

        if (regionLuminances.length === 0) return 10;
        const regionMean = regionLuminances.reduce((a,b)=>a+b,0) / regionLuminances.length;

        // Z-Score
        const zScore = (regionMean - mean) / std;

        // تحويل Z-Score إلى درجة من 20 (نطاق ضيق)
        if (zScore > 1.5) return 20;
        if (zScore > 1.0) return 18;
        if (zScore > 0.5) return 16;
        if (zScore > 0.0) return 14;
        if (zScore > -0.5) return 12;
        if (zScore > -1.0) return 10;
        if (zScore > -1.5) return 7;
        if (zScore > -2.0) return 4;
        return 2;
    }

    // تناسق الملامح (35 نقطة)
    function faceSymmetryScore(lm) {
        const le = lm.getLeftEye();
        const re = lm.getRightEye();
        const mo = lm.getMouth();
        if (!le || !re || !mo) return 17;

        const eyeDiff = Math.abs(le[0].y - re[0].y);
        const mouthTilt = Math.abs(mo[0].y - mo[6].y);
        let score = 35 - (eyeDiff * 1.5) - (mouthTilt * 1.5);
        return Math.max(1, Math.min(35, Math.round(score)));
    }

    // شكل الأنف (25 نقطة)
    function noseScore(lm) {
        const no = lm.getNose();
        const le = lm.getLeftEye();
        const re = lm.getRightEye();
        if (!no || !le || !re) return 12;

        const noseWidth = Math.abs(no[4].x - no[0].x);
        const eyeDistance = Math.abs(re[0].x - le[0].x);
        const ratio = noseWidth / Math.max(1, eyeDistance);
        let score = 25 - Math.abs(ratio - 0.3) * 35;
        return Math.max(1, Math.min(25, Math.round(score)));
    }

    // جودة الشعر (20 نقطة)
    function hairScore(imageData) {
        let edge = 0;
        const d = imageData.data;
        for (let i = 0; i < d.length - 4; i += 20) {
            edge += Math.abs(d[i] - d[i + 4]);
        }
        const val = edge / 10000;
        if (val > 40) return 20;
        if (val > 30) return 18;
        if (val > 20) return 15;
        if (val > 10) return 10;
        return 5;
    }

    // ========== 5. المحلل الرئيسي ==========
    async function analyzeImage(imageObj) {
        // فحص الإنترنت
        if (!hasInternet()) {
            const cached = localStorage.getItem('cachedResult');
            if (cached) return JSON.parse(cached);
            return { error: 'offline' };
        }

        await modelPromise;
        if (!modelsReady) {
            const cached = localStorage.getItem('cachedResult');
            if (cached) return JSON.parse(cached);
            return { error: 'offline' };
        }

        const imgElement = imageObj.element;
        const MAX_SIZE = 350;
        let w = imgElement.width, h = imgElement.height;
        let scale = 1;
        if (w > h && w > MAX_SIZE) scale = MAX_SIZE / w;
        else if (h > MAX_SIZE) scale = MAX_SIZE / h;

        const analyzeCanvas = document.createElement('canvas');
        analyzeCanvas.width = Math.round(w * scale);
        analyzeCanvas.height = Math.round(h * scale);
        const analyzeCtx = analyzeCanvas.getContext('2d');
        analyzeCtx.drawImage(imgElement, 0, 0, analyzeCanvas.width, analyzeCanvas.height);

        const options = new faceapi.TinyFaceDetectorOptions({ inputSize: 128 });
        const detections = await faceapi.detectAllFaces(analyzeCanvas, options).withFaceLandmarks(true);

        if (!detections.length) return { error: 'no_face' };
        if (detections.length > 1) return { error: 'multi_face' };

        const detection = detections[0];
        const landmarks = detection.landmarks;
        const box = detection.detection.box;
        const imageData = analyzeCtx.getImageData(0, 0, analyzeCanvas.width, analyzeCanvas.height);

        // فحص الإضاءة (تحذير فقط بدون رفض)
        let brightness = getAverageBrightness(imageData);
        if (brightness < 25) {
            console.warn('صورة مظلمة جداً');
        }

        // رسم الميش على Canvas
        const resultCanvas = document.getElementById('canvas1');
        resultCanvas.width = imgElement.width;
        resultCanvas.height = imgElement.height;
        resultCanvas.style.display = 'block';
        const resCtx = resultCanvas.getContext('2d');
        resCtx.drawImage(imgElement, 0, 0);
        const scaleX = imgElement.width / analyzeCanvas.width;
        const scaleY = imgElement.height / analyzeCanvas.height;
        resCtx.strokeStyle = '#00ff41';
        resCtx.lineWidth = 1.8;
        [landmarks.getJawOutline(), landmarks.getLeftEye(), landmarks.getRightEye(),
         landmarks.getNose(), landmarks.getMouth()].forEach(part => {
            if (part && part.length > 2) {
                resCtx.beginPath();
                const sp = part.map(p => ({ x: p.x * scaleX, y: p.y * scaleY }));
                resCtx.moveTo(sp[0].x, sp[0].y);
                for (let i = 1; i < sp.length; i++) resCtx.lineTo(sp[i].x, sp[i].y);
                resCtx.closePath();
                resCtx.stroke();
            }
        });

        // حساب الدرجات الفرعية
        const symmetry = faceSymmetryScore(landmarks);       // 35 نقطة
        const nose = noseScore(landmarks);                   // 25 نقطة
        const hair = hairScore(imageData);                   // 20 نقطة
        const skin = skinColorScore(imageData, box, analyzeCanvas.width, analyzeCanvas.height); // 20 نقطة

        // التجميع النهائي (35+25+20+20=100)
        let final = symmetry + nose + hair + skin;
        final = Math.round(final);
        final = Math.min(100, Math.max(1, final));

        // تحويل الدرجة من 100 إلى 9 للقب
        const score9 = Math.round(final / 11.11);
        const finalScore9 = Math.min(9, Math.max(1, score9));

        const bloodPercent = Math.round((11 - finalScore9) * 10);

        const resultObj = {
            score: final,
            score9: finalScore9,
            category: getCategory(finalScore9, selectedGender),
            comment: getComment(finalScore9, selectedGender),
            symmetry, nose, hair, skin,
            bloodPercent
        };

        // تخزين مؤقت
        localStorage.setItem('cachedResult', JSON.stringify(resultObj));

        return resultObj;
    }

    // ========== 6. التعليقات والألقاب الجديدة ==========
    function getCategory(score, gender) {
        if (gender === 'female') {
            const f = {
                9:'ملكة 👑✨',
                8:'مزه 😍🔥',
                7:'عسل 🍯',
                6:'ظريفة 🌸',
                5:'مقبولة 🙂',
                4:'عادية 😐',
                3:'محتاجة شغل 🛠️',
                2:'افسخي 😭',
                1:'الجمال جمال الروح 💖'
            };
            return f[score] || '';
        }
        const m = {
            9:'عسول 😍🔥',
            8:'وجيه يا زولي ✨',
            7:'سمح 😊',
            6:'عادي 😐',
            5:'نص نص 🤷‍♂️',
            4:'رائع 💀',
            3:'فار 🐀',
            2:'قرد 🙈',
            1:'Error 🚫'
        };
        return m[score] || '';
    }

    function getComment(score, gender) {
        if (gender === 'female') {
            const c = {
                9:'ما شاء الله قمر عديل، الجمال كلو اتجمع فيك. العين ما تملاك ✨',
                8:'سمحة والله، وشك فيه قبول رهيب. أي زول يشوفك يقول ما شاء الله 🔥',

    // ========== 7. تشغيل الفحص ==========
    async function runScan() {
        const imgData = originalImages[1];
        if (!imgData) return;

        const btn = document.getElementById('btnScan');
        const pw = document.getElementById('progressWrap');
        const pf = document.getElementById('progressFill');
        const pt = document.getElementById('progressText');
        const rb = document.getElementById('resultBox');

        btn.disabled = true;
        pw.style.display = 'block';
        pf.style.width = '0%';
        rb.style.display = 'none';

        const steps = ['🔍 كشف الوجه...', '📐 قياس التناسق...', '👃 تحليل الأنف...', '💇 فحص الشعر...', '🎨 تحليل البشرة...'];
        for (let i = 0; i < steps.length; i++) {
            pt.textContent = steps[i];
            pf.style.width = ((i+1)/steps.length*100) + '%';
            await new Promise(r => setTimeout(r, 400));
        }

        try {
            const result = await analyzeImage(imgData);
            if (result.error) {
                const msgs = {
                    no_face:'🚫 ما لقينا وجه في الصورة!',
                    multi_face:'👥 فيه أكثر من وجه. الرجاء صورة لشخص واحد.',
                    offline:'📴 لا يوجد اتصال بالإنترنت حالياً.'
                };
                showMessage(msgs[result.error] || 'فشل التحليل');
                btn.disabled = false;
                pw.style.display = 'none';
                return;
            }

            document.getElementById('scoreVal').textContent = result.score + '/100';
            document.getElementById('categoryVal').textContent = result.category;
            document.getElementById('commentVal').textContent = result.comment;

            const detailsHTML = `
                <div class="detail-item">✨ تناسق <span class="detail-value">${result.symmetry}/35</span></div>
                <div class="detail-item">👃 أنف <span class="detail-value">${result.nose}/25</span></div>
                <div class="detail-item">💇 شعر <span class="detail-value">${result.hair}/20</span></div>
                <div class="detail-item">🎨 بشرة <span class="detail-value">${result.skin}/20</span></div>
            `;
            document.getElementById('detailsGrid').innerHTML = detailsHTML;
            document.getElementById('bloodFill').style.width = result.bloodPercent + '%';
            document.getElementById('bloodText').textContent = result.bloodPercent + '%';
            rb.style.display = 'block';
        } catch (e) {
            showMessage('⚠️ خطأ غير متوقع. تأكد من اتصال الإنترنت.');
            console.error(e);
        } finally {
            pw.style.display = 'none';
            btn.disabled = false;
        }
    }

    // ========== 8. المعركة ==========
    async function runBattle() {
        const imgData2 = originalImages[2], imgData3 = originalImages[3];
        if (!imgData2 || !imgData3) return;
        const btn = document.getElementById('btnBattle');
        const rb = document.getElementById('battleResult');
        const pt = document.getElementById('battleProgressText');
        btn.disabled = true; rb.style.display = 'none'; pt.style.display = 'block';
        pt.textContent = '⚔️ جاري تحليل الوجهين...';

        try {
            const [r1, r2] = await Promise.all([analyzeImage(imgData2), analyzeImage(imgData3)]);
            if (r1?.error || r2?.error) {
                pt.textContent = '⚠️ تأكد من وجود وجهين صالحين.';
                setTimeout(() => { pt.style.display = 'none'; }, 3000);
                btn.disabled = false;
                return;
            }
            let win, lose;
            if (r1.score > r2.score) { win = 'المتحدي 1'; lose = 'المتحدي 2'; }
            else if (r2.score > r1.score) { win = 'المتحدي 2'; lose = 'المتحدي 1'; }
            else { win = 'تعادل'; }
            document.getElementById('battleWinner').textContent = win === 'تعادل' ? '🤝 تعادل!' : `👑 ${win} فاز!`;
            document.getElementById('battleComment').textContent = win === 'تعادل' ?
                'الاتنين نفس المستوى بالضبط!' :
                `${win} أجمل بمراحل. ${lose} روح استرجل 😄`;
            rb.style.display = 'block';
        } catch (e) {
            pt.textContent = '⚠️ حدث خطأ أثناء المعركة.';
        } finally {
            pt.style.display = 'none';
            btn.disabled = false;
        }
    }

    // ========== 9. دوال مساعدة ==========
    function getAverageBrightness(idata) {
        let sum = 0; const d = idata.data;
        for (let i = 0; i < d.length; i += 4) sum += (d[i]+d[i+1]+d[i+2])/3;
        return sum / (idata.width * idata.height);
    }
